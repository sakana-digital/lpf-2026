    <script>
      ;(function () {
        var saved = localStorage.getItem('theme')
        var isDark =
          saved === 'dark' ||
          (saved !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light')
      })()
    </script>
